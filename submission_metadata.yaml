ai_usage_summary: |
  Claude was used for architecture discussion, code review, and debugging.
  GitHub Copilot was used for autocomplete during development.
  No candidate data was fed to any LLM during ranking.
  All scoring logic, feature engineering, and ranking decisions were
  implemented and validated by the team.

# ============================================================================
# Approach summary (recommended — used at Stage 4 review)
# ============================================================================
methodology_summary: |
  Two-phase hybrid ranker. Phase 1 (offline, precompute.py): loads 100K
  candidates, runs structural trap detection (skill stuffing, mass-expert,
  date contradictions, impossible tenure, activity anomalies), embeds all
  skill/career text using sentence-transformers/all-MiniLM-L6-v2, and
  computes three feature blocks per survivor: skill_fit (semantic coverage
  of 4 must-have JD skills with keyword-alias boost layer), career_fit
  (title alignment + applied-ML-years-at-product-companies + shipped-system
  semantic evidence + experience band + industry fit, minus job-hop and
  services-only penalties; weights sum to exactly 1.0), and behavioral_fit
  (weighted geometric mean of availability, engagement, trust-verification,
  engineering signal). Hard trap-drops (>=2 genuine-impossibility flags)
  remove honeypots before writing the parquet feature store.
  Phase 2 (rank.py, <5s, pure numpy/pandas, no network): loads parquet,
  applies formula raw = (0.7*skill_must + 0.3*skill_nice) * career_fit^1.0
  * behavioral_fit^0.8 * (1 - 0.5*trust_penalty), min-max normalizes over
  all survivors, selects top-100, generates per-row reasoning from feature
  columns (no LLM), writes CSV. Reasoning uses varied opening clauses keyed
  to each candidate's strongest differentiator to avoid templating.

# ============================================================================
