# ----------------------------------------------------------------------------
# Shipped-system evidence phrases — Tier-5 path.
# A candidate who built a real system scores high even without keywords.
# ----------------------------------------------------------------------------
shipped_system_phrases:
  - "built a recommendation system"
  - "deployed a ranking system to production"
  - "shipped a search system"
  - "served retrieval at scale"
  - "launched an ML model to production"
  - "productionized embeddings"
  - "built vector search"
  - "A/B tested a ranking model"
  - "owned the retrieval pipeline"
  - "built a matching system"
  - "improved ranking quality"
  - "end-to-end ML pipeline"
  - "real-time inference"
  - "reduced latency"
  - "improved precision"
  - "embedding drift"
  - "index refresh"
  - "retrieval quality regression"
  - "candidate retrieval"
  - "document retrieval"

# ----------------------------------------------------------------------------
# DISQUALIFIERS — from JD. Soft penalties applied in career_features.
# ----------------------------------------------------------------------------
disqualifiers:
  pure_research_no_production:
    weight: 0.30
    description: "Career entirely in academic/research labs with no production deployments"
  recent_langchain_only:
    weight: 0.40
    description: "AI experience consists only of recent LangChain + OpenAI work"
  no_production_code_18mo:
    weight: 0.40
    description: "Senior engineer not writing production code for 18+ months"
  title_chaser:
    weight: 0.25
    description: "Job-hops every 1.5 years chasing title progression"
  framework_enthusiast:
    weight: 0.20
    description: "Framework tutorials only, no systems thinking"
  pure_cv_speech_robotics:
    weight: 0.35
    description: "Primary expertise CV/speech/robotics without NLP/IR exposure"
  consulting_only:
    weight: 0.30
    description: "Entire career in listed consulting/services firms"

