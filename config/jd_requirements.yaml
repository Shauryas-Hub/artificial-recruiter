# ============================================================================
# Redrob Hackathon — Job Description Requirements (machine-actionable)
# ============================================================================
# Derived from job_description.docx. Every value here is referenced by the
# feature/scoring modules. Edit here ONLY — never hardcode in src/.
# ============================================================================

role:
  title: "Senior AI Engineer — Founding Team"
  company: "Redrob AI"
  locations_preferred: ["Pune", "Noida"]
  locations_acceptable_india:
    - "Pune"
    - "Noida"
    - "Hyderabad"
    - "Mumbai"
    - "Delhi NCR"
    - "Gurgaon"
    - "Faridabad"
    - "Chandigarh"
    - "Bengaluru"
    - "Bangalore"
    - "Delhi"
    - "Gurugram"
  employment_type: "Full-time"
  experience_years_band: [5, 9]
  experience_ideal: [6, 8]

# ----------------------------------------------------------------------------
# MUST-HAVE skills — 4 hard requirements from JD.
# Each entry is a canonical phrase; candidate skills/descriptions are matched
# semantically (embedding cosine) AND by keyword alias scan.
# ----------------------------------------------------------------------------
must_have_skills:
  - name: "embeddings-based retrieval"
    aliases:
      - "sentence-transformers"
      - "OpenAI embeddings"
      - "BGE"
      - "E5"
      - "dense retrieval"
      - "embedding model"
      - "embedding-based search"
      - "semantic search"
      - "vector search"
      - "dense vector"
      - "bi-encoder"
      - "text embeddings"
      - "neural retrieval"
      - "semantic similarity"
      - "retrieval augmented"
      - "RAG"
    keyword_boost: 1.2   # multiplier when exact alias found in skill name

  - name: "vector database / hybrid search infrastructure"
    aliases:
      - "Pinecone"
      - "Weaviate"
      - "Qdrant"
      - "Milvus"
      - "OpenSearch"
      - "Elasticsearch"
      - "FAISS"
      - "vector database"
      - "vector db"
      - "hybrid search"
      - "ANN index"
      - "approximate nearest neighbor"
      - "HNSW"
      - "IVF"
      - "vector store"
      - "Chroma"
      - "pgvector"
    keyword_boost: 1.2

  - name: "strong Python"
    aliases:
      - "Python"
      - "Python 3"
      - "production Python"
      - "backend Python"
      - "PyTorch"
      - "TensorFlow"
      - "scikit-learn"
      - "numpy"
      - "pandas"
    keyword_boost: 1.0

  - name: "ranking evaluation frameworks"
    aliases:
      - "NDCG"
      - "MRR"
      - "MAP"
      - "offline-to-online correlation"
      - "A/B testing"
      - "evaluation framework"
      - "ranking eval"
      - "information retrieval evaluation"
      - "offline evaluation"
      - "relevance labeling"
      - "human judgment"
      - "precision@k"
      - "recall@k"
      - "click-through rate"
      - "online metrics"
    keyword_boost: 1.2

