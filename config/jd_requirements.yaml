# ----------------------------------------------------------------------------
# STRONG NEGATIVE signals — explicitly stated in JD.
# These are the JD's "things we explicitly do NOT want."
# ----------------------------------------------------------------------------
strong_negatives:
  - name: "computer_vision_speech_robotics_only"
    skill_keywords: ["computer vision", "opencv", "image classification", "object detection",
                     "yolo", "speech recognition", "tts", "text-to-speech", "robotics",
                     "ros", "slam", "pose estimation", "face recognition", "ocr"]
    description_keywords: ["computer vision", "speech recognition", "robotics", "image processing"]
    penalty: 0.15
    requires_nlp_ir_offset: true  # penalty waived if NLP/IR signals also present

  - name: "marketing_manager_profile"
    title_keywords: ["marketing manager", "operations manager", "hr manager", "accountant",
                     "civil engineer", "mechanical engineer", "graphic designer",
                     "content writer", "sales executive", "customer support", "business analyst"]
    penalty: 0.40
    description: "Non-technical profile with AI keywords stuffed in skills"

